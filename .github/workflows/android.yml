name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4[cite: 2]

      - name: Buildozer Action
        uses: pypa/gh-action-pypi-publish@release/v1 # Option alternative ou script manuel
        # Utilisons l'action officielle recommandée pour Kivy/Buildozer
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build with Buildozer
        uses: ArtemSerebriakov/buildozer-action@v1.6.1 # Version spécifique stabilisée
        with:
          buildozer_version: stable
          python_version: 3.9
          command: buildozer android debug[cite: 2]

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4 # Passage à la V4 pour éviter la dépréciation
        with:
          name: secure-node-apk
          path: bin/*.apk[cite: 2]